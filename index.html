<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wavearea</title>

<link href="./main.css" rel="stylesheet" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M2 12h2l2-7 3 14 3-10 2 6 2-3h6' stroke='black' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

<body>
  <main id="wavearea"></main>

  <script type="module">
    import wavearea from './dist/wavearea.js'
    // exposed for console poking and tests
    window.wa = wavearea(document.getElementById('wavearea'), {
      engine: window.__playerEngine || undefined,
      store: window.__store || undefined,
      budget: window.__budget || undefined,
    })
    if ('serviceWorker' in navigator && location.protocol === 'https:')
      navigator.serviceWorker.register('./sw.js').catch(() => {})
  </script>
</body>
