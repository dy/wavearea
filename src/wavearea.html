<div class="container"
  :ref="refs.container"
  :onmousedown.document..onmouseup.document="e=> (isMouseDown = true, loop = false, clipEnd = null, e.target.closest?.('#editarea') && window.getSelection().removeAllRanges(), e=> isMouseDown = false)"
  :onkeydown.document.delete.prevent="e => del(e.key === 'Backspace' ? -1 : 1, e.repeat)"
  :onkeydown.document.ctrl-z.prevent:onkeydown.document.meta-z.prevent="e => e.shiftKey ? redo() : undo()"
  :onkeydown.document.space.prevent="e => e.ctrlKey || e.metaKey || sil(e.repeat)"
  :onkeydown.document.enter.prevent="() => br()"
  :onkeydown.document.ctrl-c:onkeydown.document.meta-c="() => copy()"
  :onkeydown.document.ctrl-x.prevent:onkeydown.document.meta-x.prevent="() => cut()"
  :onkeydown.document.ctrl-v.prevent:onkeydown.document.meta-v.prevent="() => paste()"
  :style="{
    '--cols': cols,
    '--carety': (caretY - (refs.editarea?.getBoundingClientRect().top ?? 0)) + 'px',
    '--caretx': (caretX - (refs.editarea?.getBoundingClientRect().left ?? 0)) + 'px'
  }">
  <div id="waveform"
    :ref="refs.waveform"
    :if="total">
    <span id="caret-line"></span>

    <div id="editarea" class="wavefont" inputmode="none"
      :ref="refs.editarea"
      :class="{'playing':playing}"
      :resize.throttle-raf="() => measureWaveform()"
      :onclick:onkeyup.arrow:ontouchend:onselect:onfocus:onkeydown.arrow.throttle-raf="
        let sel = selection.get()
        if (!sel) return
        if (!playing && sel.start === caretOffset && sel.collapsed) return

        caretOffset = sel.start;
        caretLine = lineFromBlock(sel.end);

        let rects = sel.range.getClientRects()
        let rect = rects[rects.length - 1]
        if (!rect) return
        caretX = rect.right
        caretY = rect.top

        clipStart = sel.start;
        if (playing) {
          if (!sel.collapsed) {
            clipEnd = sel.end
            loop = true
            seekTo(sel.start, sel.end, true)
          } else {
            loop = false
            seekTo(caretOffset)
          }
        } else {
          clipEnd = !sel.collapsed ? sel.end : total;
          loop = !sel.collapsed;
        }
      "
      :ondragenter..ondragleave:ondragenter..ondrop="e=>(editarea.classList.add('dragover'),e=>editarea.classList.remove('dragover'))"
      :ondragover.prevent="e=>e"
      :ondrop.prevent="e => drop(e)"
      ></div>

    <div id="timecodes" :ref="refs.timecodes">
      <a :each="_, i in (lines)" :data-id="i" :href="`#${timecode(lineOffsets[i] ?? i * (cols || 0))}`" :text="timecode(lineOffsets[i] ?? i * (cols || 0))"></a>
    </div>

    <div id="floater" :ref="refs.floater"
      :class="{'loaded': total && !loading}"
      :fx.delay="caretLine, lines; refs.timecodes?.querySelector(`[data-id='${caretLine}']`)?.before(refs.floater)">
      <button id="play"
        :ref="refs.playButton"
        :hidden="!total || loading"
        :title="loading ? loading : `${playing ? 'Pause' : 'Play'} (Ctrl+Space)`"
        :onclick:onkeydown.document.ctrl-space.prevent:onkeydown.document.meta-space.prevent..onclick:onkeydown.document.ctrl-space.prevent:onkeydown.document.meta-space.prevent="() => play()"
        tabindex="-1">
        <span class="clickarea"></span>
        <svg :if="!playing" xmlns="http://www.w3.org/2000/svg"
            height="24px" viewBox="0 0 24 24" width="24px" fill="#000000">
          <path d="M0 0h24v24H0V0z" fill="none" />
          <path d="M8 5v14l11-7L8 5z" />
        </svg>
        <svg :else xmlns="http://www.w3.org/2000/svg"
            height="24px" viewBox="0 0 24 24" width="24px" fill="#000000">
          <path d="M0 0h24v24H0V0z" fill="none" />
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <button id="trim" class="op"
        :hidden="!total || loading || !loop"
        title="Trim to selection"
        :onmousedown.stop.prevent="() => trim()"
        tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
          <path d="M0 0h24v24H0z" fill="none" />
          <path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z" />
        </svg>
      </button>
      <button id="fadein" class="op"
        :hidden="!total || loading || !loop"
        title="Fade in selection"
        :onmousedown.stop.prevent="() => fade(1)"
        tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
          <path d="M0 0h24v24H0z" fill="none" />
          <path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z" />
        </svg>
      </button>
      <button id="fadeout" class="op"
        :hidden="!total || loading || !loop"
        title="Fade out selection"
        :onmousedown.stop.prevent="() => fade(-1)"
        tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
          <path d="M0 0h24v24H0z" fill="none" />
          <path d="M16 18l2.29-2.29-4.88-4.88-4 4L2 7.41 3.41 6l6 6 4-4 6.3 6.29L22 12v6z" />
        </svg>
      </button>
    </div>
  </div>

  <div id="opener"
    :if="!total && !loading"
    :scope="{files: [], sortBy: 'date'}"
    :fx="async () => {files = await api.getFiles({sortBy}).catch(() => [])}"
    :ondragover.prevent="e=>e"
    :ondrop.prevent="e => { let f = [...e.dataTransfer.files].find(f => f.type.startsWith('audio')); f && loadAudio(f, { save: true }) }">
    <nav>
      <input id="file" type="file"
            accept="audio/x-m4a,audio/mp3,audio/amr,audio/aiff,audio/wav,audio/*"
            :onchange="e => loadAudio(e.target.files[0], { save: true })" />
      <label for="file" class="open-action" title="Open audio file">
        <svg width="24px" height="24px" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" color="#000000"><path d="M6 20L18 20" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M12 16V4M12 4L15.5 7.5M12 4L8.5 7.5" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <span>open</span>
      </label>
      <button id="sample" class="open-action" title="Load demo sample (forest sounds)"
        :onclick="() => openSample()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="none"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" stroke="#000000" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
        <span>sample</span>
      </button>
      <button id="silence" class="open-action" title="New blank document (3s silence)"
        :onclick="() => openSilence()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="none"><path d="M3 12h4l2-5 3 10 2-5h7" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".25"/><path d="M3 12h18" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>silence</span>
      </button>
    </nav>
    <p id="drop-hint">or drop an audio file anywhere</p>

    <div id="files" :if="files?.length">
      <ul>
        <li :each="fileInfo in files">
          <button class="file-button"
            :onclick="() => loadAudio(fileInfo.id)"
            :title="`${fileInfo.name} (${(fileInfo.size / 1024 / 1024).toFixed(2)} MB)`">
            <span class="file-name" :text="fileInfo.name"></span>
            <span class="file-date" :text="new Date(fileInfo.timestamp).toLocaleDateString()"></span>
          </button>
        </li>
      </ul>
    </div>
  </div>

  <div id="toolbar" :if="total && !loading">
    <button id="zoomin" class="op"
      :disabled="blockSize <= 1024"
      title="Zoom in"
      :onmousedown.stop.prevent="() => zoom(1)"
      tabindex="-1">
      <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zm2.5-4h-2v2H9v-2H7V9h2V7h1v2h2v1z" />
      </svg>
    </button>
    <button id="zoomout" class="op"
      :disabled="blockSize >= 8192"
      title="Zoom out"
      :onmousedown.stop.prevent="() => zoom(-1)"
      tabindex="-1">
      <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7z" />
      </svg>
    </button>
    <button id="normalize" class="op"
      title="Normalize loudness"
      :onmousedown.stop.prevent="() => normalize()"
      tabindex="-1">
      <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v8zM16 9v11h4V9h-4z" />
      </svg>
    </button>
    <button id="download" class="op"
      title="Download WAV (selection if active)"
      :onmousedown.stop.prevent="() => download('wav')"
      tabindex="-1">
      <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
      </svg>
      <span class="fmt">wav</span>
    </button>
    <button id="download-mp3" class="op"
      title="Download MP3 (selection if active)"
      :onmousedown.stop.prevent="() => download('mp3')"
      tabindex="-1">
      <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="#000000">
        <path d="M0 0h24v24H0z" fill="none" />
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
      </svg>
      <span class="fmt">mp3</span>
    </button>
  </div>

  <div id="status" :if="loading" :text="`${loading}${total ? ' · ' + timecode(total) : ''}`"></div>

  <div id="error" :if="error" :text="error">
  </div>

</div>
